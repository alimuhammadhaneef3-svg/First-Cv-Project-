<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-left">
            <h2 class="logo">Amazon</h2>
        </div>

        <div class="nav-search">
            <input type="text" placeholder="Search Amazon">
            <button>Search</button>
        </div>

        <div class="nav-right">
            <a href="#">Sign In</a>
            <a href="#">Orders</a>
            <a href="#">Cart 🛒</a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1><strong>Big Deals Are Here</strong></h1>
            <p>Shop the latest products with amazing discounts</p>
            <button class="shop-btn">Shop Now</button>
           
        </div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="">
                <h3>Smart Phone</h3>
                <p class="price">$499</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" alt="">
                <h3>Laptop</h3>
                <p class="price">$899</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" alt="">
                <h3>Headphones</h3>
                <p class="price">$199</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12" alt="">
                <h3>Smart Watch</h3>
                <p class="price">$249</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Amazon Clone. All rights reserved.</p>
    </footer>

</body>
</html>
